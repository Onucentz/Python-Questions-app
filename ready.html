<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ready Page</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #007bff, #00c6ff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            width:450px;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#007bff;
            margin-bottom:20px;
            font-size:32px;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.6;
            margin-bottom:30px;
        }

        .warning-box{
            background:#fff3cd;
            color:#856404;
            padding:15px;
            border-radius:10px;
            margin-bottom:30px;
            border:1px solid #ffeeba;
            font-size:16px;
        }

        .start-btn{
            background:#28a745;
            color:white;
            border:none;
            padding:15px 35px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .start-btn:hover{
            background:#218838;
            transform:scale(1.05);
        }

        .info{
            margin-top:25px;
            font-size:14px;
            color:#777;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Welcome {{ fname }}
        </h1>

        <p>
            Read all questions carefully before selecting your answers.
        </p>

        <div class="warning-box">

            ⏱️ The timer starts immediately after clicking commence.<br><br>

        </div>

        <a href="/quiz">

            <button class="start-btn">

                COMMENCE TEST

            </button>

        </a>

        <div class="info">

            Secure Quiz System v2.1

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Quiz System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .admin-link{
            text-align:center;
            margin-top:20px;
        }

        .admin-link a{
            text-decoration:none;
            color:#555;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Student Login</h1>

        <form method="POST" action="/ready">

            <input 
                type="text"
                name="fname"
                placeholder="First Name"
                required
            >

            <input 
                type="text"
                name="sname"
                placeholder="Surname"
                required
            >

            <input 
                type="text"
                name="sclass"
                placeholder="Class"
                required
            >

            <button type="submit">
                Start Assessment
            </button>

        </form>

        <div class="admin-link">

            <a href="/admin/login">
                Admin Access
            </a>

        </div>

    </div>

</body>
</html>

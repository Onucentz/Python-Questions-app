<!DOCTYPE html>
<html>
<head>

    <title>Admin Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:black;
            color:white;
        }

        a{
            text-decoration:none;
            background:red;
            color:white;
            padding:10px 20px;
        }

    </style>

</head>

<body>

<h1>
    Student Results
</h1>

<table>

    <tr>

        <th>First Name</th>
        <th>Surname</th>
        <th>Class</th>
        <th>Score</th>
        <th>Percentage</th>
        <th>Date & Time</th>

    </tr>

    {% for row in data %}

    <tr>

        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ "%.1f"|format(row[4]) }}%</td>
        <td>{{ row[5] }}</td>
    </tr>

    {% endfor %}

</table>

<br><br>

<a href="/admin/logout">
    Logout
</a>

<br><br>

<a href="/export/pdf">
    Export Results PDF
</a>

</body>
</html>

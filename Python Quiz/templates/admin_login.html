<!DOCTYPE html>
<html>
<head>

    <title>Admin Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:black;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>
        Admin Login
    </h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
